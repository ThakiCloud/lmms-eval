dataset_path: /data/workspace/datasets/vdu/icdar_2021_table_parsing/hf_dataset
dataset_kwargs:
  load_from_disk: True
task: "icdar_table_parsing"
test_split: test
output_type: generate_until
doc_to_visual: !function utils.table_parsing_doc_to_visual
doc_to_text: !function utils.table_parsing_doc_to_text
doc_to_messages: !function utils.table_parsing_doc_to_messages
doc_to_target: !function utils.table_parsing_doc_to_target
generation_kwargs:
  max_new_tokens: 8192
  temperature: 0
  do_sample: false
process_results: !function utils.table_parsing_process_results
metric_list:
  - metric: teds
    aggregation: mean
    higher_is_better: true
  - metric: teds_struct
    aggregation: mean
    higher_is_better: true
  - metric: ocr
    aggregation: mean
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: ""
    prompt: "qwenvl html"
metadata:
  - version: 0.0
